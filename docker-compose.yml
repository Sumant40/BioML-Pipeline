services:

  datagen:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "pip install --quiet --no-cache-dir pandas==2.2.2 numpy==1.26.4 && mkdir -p data/processed && python data/generate_data.py"

  spark:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./spark_pipeline:/app/spark_pipeline
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    command: sh -c "apt-get update -qq && apt-get install -y -qq openjdk-21-jdk-headless && export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64 && pip install --quiet --no-cache-dir pyspark==3.5.1 pandas==2.2.2 scikit-learn==1.4.2 && mkdir -p data/processed && python spark_pipeline/preprocess.py"
    depends_on:
      datagen:
        condition: service_completed_successfully

  tensorflow:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./tf_model:/app/tf_model
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=3
      - CUDA_VISIBLE_DEVICES=""
    command: sh -c "pip install --quiet --no-cache-dir tensorflow-cpu==2.16.1 scikit-learn==1.4.2 pandas==2.2.2 numpy==1.26.4 && mkdir -p models && python tf_model/train_tf.py"
    depends_on:
      spark:
        condition: service_completed_successfully

  pytorch:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./pytorch_model:/app/pytorch_model
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "pip install --quiet --no-cache-dir torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu && pip install --quiet --no-cache-dir pandas==2.2.2 numpy==1.26.4 && mkdir -p models && python pytorch_model/train_pytorch.py"
    depends_on:
      spark:
        condition: service_completed_successfully

  ensemble:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./ensemble:/app/ensemble
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "pip install --quiet --no-cache-dir numpy==1.26.4 scikit-learn==1.4.2 && python ensemble/predict.py"
    depends_on:
      tensorflow:
        condition: service_completed_successfully
      pytorch:
        condition: service_completed_successfully